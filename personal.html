<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Stats - Cublytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen overflow-hidden">

  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0">
    <div class="p-6">
      <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Cublytics</h1>
    </div>
    <nav class="flex-1 px-4 space-y-2">
      <a href="/" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Home</a>
      <a href="/personal.html" class="block px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Personal Statistics</a>
      <a href="/predictor.html" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Competition Predictor</a>
      <a href="/improvement.html" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Improvement Calc</a>
    </nav>
    <div class="p-4 border-t border-slate-700" id="authSection">
      <a href="/login.html" class="block w-full bg-slate-700 hover:bg-slate-600 text-center text-white font-semibold py-2 px-4 rounded-lg transition-colors">
        Login / Sign Up
      </a>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto w-full">
    <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700 w-full mb-8">
      <h2 class="text-2xl font-bold text-white mb-4">Lookup a WCA Profile</h2>
      <div class="flex flex-col sm:flex-row gap-4 w-full">
        <input type="text" id="wcaInput" placeholder="Enter WCA ID (e.g., 2015KLEM01)" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-6 py-3 text-lg text-white focus:outline-none focus:border-blue-500 transition-colors"/>
        <button id="searchBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg whitespace-nowrap shadow-lg">
          Search Database
        </button>
      </div>
    </div>

    <div id="results" class="w-full"></div>
  </main>

  <script>
    const searchBtn = document.getElementById('searchBtn');
    const wcaInput = document.getElementById('wcaInput');
    const resultsDiv = document.getElementById('results');

    // Global state to hold data for our dropdowns without re-fetching
    let currentWcaData = null;
    let currentHistData = null;
    let rankMode = 'national'; // 'national' or 'continental'

    const wcaEvents = ['333', '222', '444', '555', '666', '777', '333bf', '333fm', '333oh', 'clock', 'minx', 'pyram', 'skewb', 'sq1', '444bf', '555bf', '333mbf'];
    const eventNames = { '333': '3x3x3 Cube', '222': '2x2x2 Cube', '444': '4x4x4 Cube', '555': '5x5x5 Cube', '666': '6x6x6 Cube', '777': '7x7x7 Cube', '333bf': '3x3x3 Blindfolded', '333fm': '3x3x3 Fewest Moves', '333oh': '3x3x3 One-Handed', 'clock': 'Clock', 'minx': 'Megaminx', 'pyram': 'Pyraminx', 'skewb': 'Skewb', 'sq1': 'Square-1', '444bf': '4x4x4 Blindfolded', '555bf': '5x5x5 Blindfolded', '333mbf': '3x3x3 Multi-Blind' };
    const roundNames = { '1': 'First Round', '2': 'Second Round', '3': 'Semi Final', 'c': 'Combined First', 'd': 'Combined Second', 'e': 'Combined Third', 'f': 'Final', 'h': 'Qualification', 'b': 'B Final' };

    function getCountryName(iso) {
      if (!iso) return 'Unknown';
      try { return new Intl.DisplayNames(['en'], { type: 'region' }).of(iso) || iso; } catch (e) { return iso; }
    }

    function formatCompId(id) {
      return id.replace(/([a-z])([A-Z0-9])/g, '$1 $2');
    }

    function formatTime(eventId, amount, isAverage = false) {
      if (amount === -1) return 'DNF';
      if (amount === -2) return 'DNS';
      if (!amount || amount <= 0) return '';
      
      if (eventId === '333fm') return isAverage ? (amount / 100).toFixed(2) : amount;
      
      if (eventId === '333mbf') {
        const str = String(amount).padStart(9, '0');
        const DD = parseInt(str.slice(0, 2), 10);
        const TTTTT = parseInt(str.slice(2, 7), 10);
        const MM = parseInt(str.slice(7, 9), 10);
        const solved = (99 - DD) + MM;
        const attempted = solved + MM;
        let mins = Math.floor(TTTTT / 60);
        let secs = String(TTTTT % 60).padStart(2, '0');
        return `${solved}/${attempted} in ${mins}:${secs}`;
      }

      let seconds = amount / 100;
      if (seconds >= 60) {
        let mins = Math.floor(seconds / 60);
        let secs = (seconds % 60).toFixed(2);
        return `${mins}:${secs.padStart(5, '0')}`;
      }
      return seconds.toFixed(2);
    }

    async function checkAuth() {
      try {
        const response = await fetch('/api/me');
        if (response.ok) {
          const user = await response.json();
          document.getElementById('authSection').innerHTML = `
            <div class="flex flex-col gap-2 w-full">
              <span class="text-emerald-400 font-bold text-center truncate">Welcome, ${user.username}!</span>
              <button onclick="logout()" class="w-full bg-slate-700 hover:bg-red-600/80 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">Log Out</button>
            </div>
          `;
          if (user.wcaId) {
            wcaInput.value = user.wcaId;
            searchBtn.click();
          }
        }
      } catch (error) { console.error("Auth check failed:", error); }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.reload(); 
    }

    checkAuth();

    searchBtn.addEventListener('click', async () => {
      const wcaId = wcaInput.value.trim().toUpperCase();
      if (!wcaId) return;

      resultsDiv.innerHTML = '<p class="text-slate-400 text-center text-lg mt-8 animate-pulse">Fetching records from the WCA & Local Database...</p>';

      try {
        // 1. Fetch live data from WCA
        const response = await fetch(`https://www.worldcubeassociation.org/api/v0/persons/${wcaId}`);
        
        // CHECK FOR RATE LIMITING
        if (response.status === 429) {
           resultsDiv.innerHTML = `<p class="text-yellow-400 text-center text-lg mt-8">WCA API Rate Limit Reached. Please wait about 60 seconds and try again.</p>`;
           return;
        }
        if (!response.ok) {
           resultsDiv.innerHTML = `<p class="text-red-400 text-center text-lg mt-8">WCA ID not found. Please check your spelling.</p>`;
           return;
        }

        const wcaData = await response.json();
        
        // 2. Fetch Comps count (with its own rate limit check)
        let compCount = '-';
        try {
          const compRes = await fetch(`https://www.worldcubeassociation.org/api/v0/persons/${wcaId}/competitions`);
          if (compRes.ok) {
            const compData = await compRes.json();
            compCount = compData.length;
          }
        } catch (e) { 
          console.warn("Comp count fetch failed, likely rate limited."); 
        }

        // 3. Fetch Local DB Stats (Handling Replit Cold Starts)
        let dbStats = { solves: 0, gold: 0, silver: 0, bronze: 0 };
        let historyResults = [];
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 second timeout

          const histRes = await fetch(`/api/history?id=${wcaId}`, { signal: controller.signal });
          clearTimeout(timeoutId);

          if (histRes.ok) {
            const histData = await histRes.json();
            dbStats = histData.stats;
            historyResults = histData.results || [];
          } else {
            console.warn(`Local DB returned status: ${histRes.status}`);
          }
        } catch (e) { 
          console.warn("Local DB fetch failed. Replit might be waking up from sleep. Error:", e);
        }

        // Calculate completed solves
        let completedSolvesCount = 0;
        historyResults.forEach(r => {
           ['value1', 'value2', 'value3', 'value4', 'value5'].forEach(v => {
             if (r[v] && r[v] > 0) completedSolvesCount++;
           });
        });

        currentWcaData = {
          wca_id: wcaData.person.wca_id,
          name: wcaData.person.name,
          country: wcaData.person.country_iso2,
          avatar: wcaData.person.avatar.url || 'https://www.worldcubeassociation.org/assets/missing_avatar_thumb-12654dd6f1aa6d458e80d02d6fb8b440965e6d6af031f0eb11a2f9602058b883.png',
          records: wcaData.personal_records,
          compCount,
          completedSolvesCount
        };
        currentHistData = { stats: dbStats, results: historyResults };

        renderUI();

      } catch (error) {
        resultsDiv.innerHTML = `
          <div class="bg-red-900/50 border border-red-500 p-6 rounded-xl mt-8 w-full">
            <h3 class="text-red-400 font-bold text-lg mb-2">Network Error:</h3>
            <p class="text-white font-mono text-sm break-words">Failed to connect to the WCA API. Please check your internet connection or try again in a moment.</p>
            <p class="text-slate-400 font-mono text-xs mt-4 break-words">${error.message}</p>
          </div>
        `;
      }
    });

    function renderUI() {
      if (!currentWcaData) return;
      const data = currentWcaData;
      const dbStats = currentHistData.stats;

      const competedEventIds = [...new Set(currentHistData.results.map(r => r.event_id))];
      const selectedEventFilter = document.getElementById('eventFilter') ? document.getElementById('eventFilter').value : 'all';

      // 1. Build PR Table
      let prRows = '';
      wcaEvents.forEach(ev => {
        if (data.records && data.records[ev]) {
          const s = data.records[ev].single;
          const a = data.records[ev].average;
          
          const single = s ? formatTime(ev, s.best, false) : '-';
          const avg = a ? formatTime(ev, a.best, true) : '-';

          const sWR = s ? s.world_rank : '-';
          const aWR = a ? a.world_rank : '-';
          
          const sLocalRank = s ? (rankMode === 'national' ? s.country_rank : s.continent_rank) : '-';
          const aLocalRank = a ? (rankMode === 'national' ? a.country_rank : a.continent_rank) : '-';

          prRows += `
            <tr class="hover:bg-slate-700/50 transition-colors border-b border-slate-700/50 last:border-0 text-sm">
              <td class="p-4 font-semibold text-white">${eventNames[ev]}</td>
              <td class="p-4 text-emerald-400 font-bold">${single}</td>
              <td class="p-4 text-slate-400">${sLocalRank}</td>
              <td class="p-4 text-slate-100 font-bold text-md">${sWR}</td>
              <td class="p-4 text-blue-400 font-bold">${avg}</td>
              <td class="p-4 text-slate-400">${aLocalRank}</td>
              <td class="p-4 text-slate-100 font-bold text-md">${aWR}</td>
            </tr>
          `;
        }
      });
      if (!prRows) prRows = '<tr><td colspan="7" class="p-4 text-center text-slate-400">No official results found.</td></tr>';

      // 2. Build History Table
      let historyRows = '';
      const filteredResults = selectedEventFilter === 'all' 
        ? currentHistData.results 
        : currentHistData.results.filter(r => r.event_id === selectedEventFilter);

      if (filteredResults.length > 0) {
        filteredResults.forEach(res => {
          const isSinglePR = data.records[res.event_id]?.single?.best === res.best;
          const isAvgPR = data.records[res.event_id]?.average?.best === res.average;

          const solves = [res.value1, res.value2, res.value3, res.value4, res.value5]
            .filter(v => v !== undefined && v !== 0)
            .map(v => formatTime(res.event_id, v, false))
            .join(', ');

          historyRows += `
            <tr class="hover:bg-slate-700/50 transition-colors border-b border-slate-700/50 text-sm">
              <td class="p-3">${formatCompId(res.competition_id)}</td>
              <td class="p-3 font-semibold text-white">${eventNames[res.event_id] || res.event_id}</td>
              <td class="p-3 text-slate-400">${roundNames[res.round_type_id] || res.round_type_id}</td>
              <td class="p-3">${res.pos}</td>
              <td class="p-3 text-slate-300 italic text-xs">${solves || '-'}</td>
              <td class="p-3 ${isSinglePR ? 'text-yellow-400 font-bold bg-yellow-900/20' : 'text-emerald-400'}">${formatTime(res.event_id, res.best, false)}</td>
              <td class="p-3 ${isAvgPR ? 'text-yellow-400 font-bold bg-yellow-900/20' : 'text-blue-400'}">${formatTime(res.event_id, res.average, true)}</td>
            </tr>
          `;
        });
      } else {
        historyRows = '<tr><td colspan="7" class="p-4 text-center text-slate-500">No competition history found for this event.</td></tr>';
      }

      // 3. Render Dashboard
      resultsDiv.innerHTML = `
        <div class="flex flex-col gap-8 w-full animate-fade-in">
          
          <div class="flex flex-col xl:flex-row gap-6 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg items-center xl:items-stretch">
            <div class="flex flex-col items-center xl:items-start justify-center min-w-[250px] border-b xl:border-b-0 xl:border-r border-slate-700 pb-6 xl:pb-0 xl:pr-6">
              <img src="${data.avatar}" alt="Profile" class="w-28 h-28 rounded-full mb-4 border-[3px] border-slate-600 object-cover shadow-inner bg-slate-700">
              <h3 class="text-2xl font-bold text-white mb-1 text-center xl:text-left">${data.name}</h3>
              <p class="text-blue-400 text-lg font-bold mb-3 tracking-wider">${data.wca_id}</p>
              <div class="flex items-center gap-2 bg-slate-900 px-3 py-2 rounded-lg border border-slate-700">
                <img src="https://flagcdn.com/w40/${data.country.toLowerCase()}.png" alt="Flag" class="w-6 h-4 rounded-sm object-cover">
                <span class="text-slate-200 text-sm font-semibold">${getCountryName(data.country)}</span>
              </div>
            </div>

            <div class="flex-1 w-full flex flex-col justify-center">
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50 text-center">
                  <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Competitions</p>
                  <p class="text-2xl font-bold text-white">${data.compCount}</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50 text-center">
                  <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Rounds</p>
                  <p class="text-2xl font-bold text-white">${dbStats.solves}</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50 text-center">
                  <p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Completed Solves</p>
                  <p class="text-2xl font-bold text-white">${data.completedSolvesCount}</p>
                </div>
                <div class="flex gap-2 w-full h-full">
                  <div class="flex-1 bg-yellow-900/20 p-2 rounded-lg border border-yellow-500/30 flex flex-col justify-center items-center">
                     <p class="text-yellow-500 text-[10px] font-bold uppercase mb-1">Gold</p>
                     <p class="text-xl font-bold text-white">${dbStats.gold}</p>
                  </div>
                  <div class="flex-1 bg-slate-700/30 p-2 rounded-lg border border-slate-400/30 flex flex-col justify-center items-center">
                     <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Silver</p>
                     <p class="text-xl font-bold text-white">${dbStats.silver}</p>
                  </div>
                  <div class="flex-1 bg-amber-900/20 p-2 rounded-lg border border-amber-600/30 flex flex-col justify-center items-center">
                     <p class="text-amber-600 text-[10px] font-bold uppercase mb-1">Bronze</p>
                     <p class="text-xl font-bold text-white">${dbStats.bronze}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-lg w-full">
            <div class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
              <h4 class="text-lg font-bold text-white">Official Personal Records</h4>
              <select id="rankToggle" class="bg-slate-800 text-sm text-white border border-slate-600 rounded px-3 py-1 outline-none">
                <option value="national" ${rankMode === 'national' ? 'selected' : ''}>Show National Rank</option>
                <option value="continental" ${rankMode === 'continental' ? 'selected' : ''}>Show Continental Rank</option>
              </select>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse min-w-[700px]">
                <thead>
                  <tr class="bg-slate-800 border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider">
                    <th class="p-4 font-semibold">Event</th>
                    <th class="p-4 font-semibold text-emerald-400">Single</th>
                    <th class="p-4 font-semibold">${rankMode === 'national' ? 'National' : 'Continental'} Rank</th>
                    <th class="p-4 font-extrabold text-slate-200">World Rank</th>
                    <th class="p-4 font-semibold text-blue-400">Average</th>
                    <th class="p-4 font-semibold">${rankMode === 'national' ? 'National' : 'Continental'} Rank</th>
                    <th class="p-4 font-extrabold text-slate-200">World Rank</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/50">
                  ${prRows}
                </tbody>
              </table>
            </div>
          </div>

          <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-lg w-full mb-8">
            <div class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
              <h4 class="text-lg font-bold text-white">Competition Results</h4>
              <select id="eventFilter" class="bg-slate-800 text-sm text-white border border-slate-600 rounded px-3 py-1 outline-none">
                <option value="all">All Events</option>
                ${competedEventIds.map(id => `<option value="${id}" ${selectedEventFilter === id ? 'selected' : ''}>${eventNames[id] || id}</option>`).join('')}
              </select>
            </div>
            <div class="p-0 text-slate-400 text-sm overflow-x-auto">
              <table class="w-full text-left border-collapse min-w-[800px]">
                <thead>
                  <tr class="bg-slate-900/50 text-slate-400 text-xs uppercase tracking-wider border-b border-slate-700">
                    <th class="p-3 font-semibold pl-4">Competition</th>
                    <th class="p-3 font-semibold">Event</th>
                    <th class="p-3 font-semibold">Round</th>
                    <th class="p-3 font-semibold">Pos</th>
                    <th class="p-3 font-semibold">Solves</th>
                    <th class="p-3 font-semibold text-emerald-400">Best</th>
                    <th class="p-3 font-semibold text-blue-400">Average</th>
                  </tr>
                </thead>
                <tbody>
                  ${historyRows}
                </tbody>
              </table>
            </div>
          </div>

        </div>
      `;

      document.getElementById('rankToggle').addEventListener('change', (e) => {
        rankMode = e.target.value;
        renderUI();
      });

      document.getElementById('eventFilter').addEventListener('change', () => {
        renderUI();
      });
    }

    wcaInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
  </script>
</body>
</html>
