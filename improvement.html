<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Improvement Calc - Cublytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen overflow-hidden">

  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0">
    <div class="p-6">
      <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Cublytics</h1>
    </div>
    <nav class="flex-1 px-4 space-y-2">
      <a href="/" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Home</a>
      <a href="/personal.html" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Personal Statistics</a>
      <a href="/predictor.html" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Competition Predictor</a>
      <a href="/improvement.html" class="block px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Improvement Calc</a>
    </nav>
    <div class="p-4 border-t border-slate-700">
      <a href="/login.html" class="block w-full bg-slate-700 hover:bg-slate-600 text-center text-white font-semibold py-2 px-4 rounded-lg transition-colors">
        Login / Sign Up
      </a>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto w-full">
    <header class="mb-10">
      <h2 class="text-3xl font-bold text-white">Improvement Calculator</h2>
      <p class="text-slate-400 mt-2 text-lg">Set a goal rank and see what time you need to achieve it.</p>
    </header>

    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 max-w-3xl shadow-xl">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-4">
          <div>
            <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-widest">Select Event</label>
            <select id="eventSelect" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none">
              <option value="333">3x3x3 Cube</option>
              <option value="222">2x2x2 Cube</option>
              <option value="444">4x4x4 Cube</option>
              <option value="333oh">3x3x3 One-Handed</option>
            </select>
          </div>
          <div>
            <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-widest">Target World Rank</label>
            <input type="number" id="targetRank" placeholder="e.g. 1000" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none">
          </div>
          <button id="calcBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-emerald-900/20">
            Calculate Goal Time
          </button>
        </div>

        <div id="resultBox" class="bg-slate-900 rounded-xl p-6 border border-slate-700 flex flex-col justify-center items-center text-center">
          <p class="text-slate-500 italic">Enter a rank to see the required time</p>
        </div>
      </div>
    </div>
  </main>
  <script>
    // Check if the user is logged in
    async function checkAuth() {
      try {
        const response = await fetch('/api/me');
        if (response.ok) {
          const user = await response.json();

          // Find the login button container
          const authDiv = document.querySelector('.border-t.border-slate-700');

          if (authDiv) {
            // Replace the Login button with a Welcome message and Logout button
            authDiv.innerHTML = `
              <div class="flex flex-col gap-2 w-full">
                <span class="text-emerald-400 font-bold text-center">Welcome, ${user.username}!</span>
                <button onclick="logout()" class="w-full bg-slate-700 hover:bg-red-600/80 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">
                  Log Out
                </button>
              </div>
            `;
          }
        }
      } catch (error) {
        console.error("Auth check failed:", error);
      }
    }

    // Handle logout
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.reload(); // Refresh the page to show the login button again
    }

    // Run the check when the page loads
    checkAuth();
  </script>
</body>
</html>
