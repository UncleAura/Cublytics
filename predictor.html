<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comp Predictor - Cublytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen overflow-hidden">

  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0">
    <div class="p-6">
      <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Cublytics</h1>
    </div>
    <nav class="flex-1 px-4 space-y-2">
      <a href="/" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Home</a>
      <a href="/personal.html" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Personal Statistics</a>
      <a href="/predictor.html" class="block px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Competition Predictor</a>
      <a href="/improvement.html" class="block px-4 py-2 text-slate-400 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">Improvement Calc</a>
    </nav>
    <div class="p-4 border-t border-slate-700">
      <a href="/login.html" class="block w-full bg-slate-700 hover:bg-slate-600 text-center text-white font-semibold py-2 px-4 rounded-lg transition-colors">
        Login / Sign Up
      </a>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto w-full">

    <header class="mb-10">
      <h2 class="text-3xl font-bold text-white">Competition Predictor</h2>
      <p class="text-slate-400 mt-2 text-lg">Calculate your likely official results based on your times at home.</p>
    </header>

    <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700 w-full max-w-2xl mb-8">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">

        <div>
          <label class="block text-slate-400 text-sm font-bold mb-2 uppercase tracking-wide">Event</label>
          <select id="eventSelect" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors appearance-none cursor-pointer">
            <option value="333">3x3x3 Cube</option>
            <option value="222">2x2x2 Cube</option>
            <option value="444">4x4x4 Cube</option>
            <option value="333oh">3x3x3 One-Handed</option>
          </select>
        </div>

        <div>
          <label class="block text-slate-400 text-sm font-bold mb-2 uppercase tracking-wide">Home Global Average (Sec)</label>
          <input type="number" step="0.01" id="globalAvgInput" placeholder="e.g., 12.50" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors"/>
        </div>

      </div>

      <button id="predictBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg shadow-lg">
        Generate Prediction
      </button>
    </div>

    <div id="predictionResults" class="w-full max-w-2xl"></div>

  </main>

  <script>
    // We will write the prediction math here next!
    const predictBtn = document.getElementById('predictBtn');
    const globalAvgInput = document.getElementById('globalAvgInput');
    const predictionResults = document.getElementById('predictionResults');

    predictBtn.addEventListener('click', () => {
      const avg = parseFloat(globalAvgInput.value);

      if (!avg || avg <= 0) {
        predictionResults.innerHTML = '<p class="text-red-400 mt-2">Please enter a valid global average.</p>';
        return;
      }

      predictionResults.innerHTML = '<p class="text-slate-400 mt-2">Crunching the numbers...</p>';

      // Placeholder for our math
      setTimeout(() => {
        predictionResults.innerHTML = '<p class="text-emerald-400 mt-2 font-bold">Math logic coming soon!</p>';
      }, 500);
    });
  </script>
  <script>
    // Check if the user is logged in
    async function checkAuth() {
      try {
        const response = await fetch('/api/me');
        if (response.ok) {
          const user = await response.json();

          // Find the login button container
          const authDiv = document.querySelector('.border-t.border-slate-700');

          if (authDiv) {
            // Replace the Login button with a Welcome message and Logout button
            authDiv.innerHTML = `
              <div class="flex flex-col gap-2 w-full">
                <span class="text-emerald-400 font-bold text-center">Welcome, ${user.username}!</span>
                <button onclick="logout()" class="w-full bg-slate-700 hover:bg-red-600/80 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">
                  Log Out
                </button>
              </div>
            `;
          }
        }
      } catch (error) {
        console.error("Auth check failed:", error);
      }
    }

    // Handle logout
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.reload(); // Refresh the page to show the login button again
    }

    // Run the check when the page loads
    checkAuth();
  </script>
</body>
</html>
