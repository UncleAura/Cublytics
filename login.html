<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Cublytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen items-center justify-center p-4">

  <div class="bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 w-full max-w-md relative">
    
    <a href="/" class="text-slate-400 hover:text-white absolute top-6 left-6 text-sm font-semibold transition-colors">
      &larr; Back
    </a>

    <div class="text-center mb-8 mt-4">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">Cublytics</h1>
      <h2 id="formTitle" class="text-xl font-bold text-white">Welcome Back</h2>
    </div>

    <form id="authForm" class="space-y-4">
      
      <div id="wcaFieldGroup" style="display: none;">
        <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-widest">WCA ID (Optional)</label>
        <input type="text" id="wcaId" placeholder="e.g. 2015KLEM01" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors">
      </div>

      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-widest">Username</label>
        <input type="text" id="username" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors">
      </div>

      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-widest">Password</label>
        <input type="password" id="password" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg mt-4">
        Log In
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-slate-400 text-sm">
        <span id="toggleText">Don't have an account?</span> 
        <button type="button" id="toggleBtn" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Sign Up</button>
      </p>
    </div>
    
    <div id="authMessage" class="mt-4 text-center text-sm hidden p-3 rounded-lg"></div>
  </div>

  <script>
    let isLoginMode = true; // Default is now Log In

    const formTitle = document.getElementById('formTitle');
    const wcaFieldGroup = document.getElementById('wcaFieldGroup');
    const submitBtn = document.getElementById('submitBtn');
    const toggleText = document.getElementById('toggleText');
    const toggleBtn = document.getElementById('toggleBtn');
    const authForm = document.getElementById('authForm');
    const authMessage = document.getElementById('authMessage');

    toggleBtn.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      
      if (isLoginMode) {
        formTitle.innerText = 'Welcome Back';
        wcaFieldGroup.style.display = 'none'; 
        submitBtn.innerText = 'Log In';
        toggleText.innerText = 'Don\'t have an account?';
        toggleBtn.innerText = 'Sign Up';
      } else {
        formTitle.innerText = 'Create an Account';
        wcaFieldGroup.style.display = 'block';
        submitBtn.innerText = 'Sign Up';
        toggleText.innerText = 'Already have an account?';
        toggleBtn.innerText = 'Log In';
      }
      
      authMessage.classList.add('hidden');
      authForm.reset();
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const wcaId = document.getElementById('wcaId').value.trim().toUpperCase();

      authMessage.classList.remove('hidden');
      authMessage.className = 'mt-4 text-center text-sm p-3 rounded-lg bg-slate-700 text-slate-300';
      authMessage.innerText = 'Connecting...';

      // Decide which backend route to hit
      const endpoint = isLoginMode ? '/api/login' : '/api/signup';
      const payload = { username, password };
      if (!isLoginMode) payload.wcaId = wcaId;

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await response.json();

        if (!response.ok) {
          authMessage.className = 'mt-4 text-center text-sm p-3 rounded-lg bg-red-900/50 text-red-400 border border-red-700';
          authMessage.innerText = data.error;
        } else {
          authMessage.className = 'mt-4 text-center text-sm p-3 rounded-lg bg-emerald-900/50 text-emerald-400 border border-emerald-700';
          authMessage.innerText = data.message;
          
          if (isLoginMode) {
            // If login is successful, redirect to the dashboard!
            setTimeout(() => window.location.href = '/', 1000);
          } else {
            // If signup is successful, automatically switch them to the login view
            setTimeout(() => toggleBtn.click(), 1500);
          }
        }
      } catch (error) {
        authMessage.className = 'mt-4 text-center text-sm p-3 rounded-lg bg-red-900/50 text-red-400 border border-red-700';
        authMessage.innerText = 'Server error. Please try again.';
      }
    });
  </script>
</body>
</html>
